services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ugc
      POSTGRES_PASSWORD: ugc_password
      POSTGRES_DB: ugc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ugc -d ugc_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8917:8917"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ugc:ugc_password@postgres:5432/ugc_db
      DATABASE_URL_SYNC: postgresql://ugc:ugc_password@postgres:5432/ugc_db
      REDIS_URL: redis://redis:6379/0
      BASE_URL: http://localhost:8917
      FRONTEND_URL: http://localhost:4317
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8917 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ugc:ugc_password@postgres:5432/ugc_db
      DATABASE_URL_SYNC: postgresql://ugc:ugc_password@postgres:5432/ugc_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ugc:ugc_password@postgres:5432/ugc_db
      DATABASE_URL_SYNC: postgresql://ugc:ugc_password@postgres:5432/ugc_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4317:4317"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8917
      FRONTEND_PORT: 4317
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
