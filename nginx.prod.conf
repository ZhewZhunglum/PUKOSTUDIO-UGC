worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100m;

    upstream ugc_backend  { server ugc-backend:8917; }
    upstream ugc_frontend { server ugc-frontend:3000; }

    server {
        listen 8080;
        server_name _;

        # Backend API
        location /api/ {
            proxy_pass         http://ugc_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        location /health {
            proxy_pass http://ugc_backend;
            proxy_set_header Host $host;
        }

        location /docs   { proxy_pass http://ugc_backend; proxy_set_header Host $host; }
        location /redoc  { proxy_pass http://ugc_backend; proxy_set_header Host $host; }
        location /openapi.json { proxy_pass http://ugc_backend; proxy_set_header Host $host; }

        # Frontend (Next.js)
        location / {
            proxy_pass         http://ugc_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade     $http_upgrade;
            proxy_set_header   Connection  "upgrade";
            proxy_set_header   Host        $host;
            proxy_read_timeout 60s;
        }
    }
}
